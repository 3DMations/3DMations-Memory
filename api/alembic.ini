# Alembic configuration for the 3DMations Memory Hub.
# The sqlalchemy.url key is intentionally blank — env.py reads DATABASE_URL
# from the environment at runtime and converts the asyncpg URL to psycopg.

[alembic]
script_location = alembic
prepend_sys_path = .
sqlalchemy.url =

# Migration file naming: zero-padded sequence + slug
file_template = %%(rev)s_%%(slug)s

# Leave timezone empty so Alembic uses local server time if it ever writes
timezone =

# Max length for the slug portion of auto-generated filenames
truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command
revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without a source .py file
sourceless = false

# Version path separator
version_path_separator = os

# Output encoding used when revision files are written
output_encoding = utf-8


[post_write_hooks]
# No post-write hooks configured.


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

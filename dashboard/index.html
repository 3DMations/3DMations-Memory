<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Memory Hub</title>
  <style>
    /* AUDIT-020: System font fallback if Google Fonts CDN is blocked (air-gapped networks) */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117; color: #e1e4e8; min-height: 100vh; padding: 2rem;
    }
    header { margin-bottom: 2rem; }
    h1 { font-size: 1.5rem; font-weight: 600; color: #f0f6fc; }
    h1 span { color: #58a6ff; }
    .subtitle { color: #8b949e; font-size: 0.85rem; margin-top: 0.25rem; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1rem; margin-bottom: 1.5rem;
    }
    .card {
      background: #161b22; border: 1px solid #30363d; border-radius: 8px;
      padding: 1.25rem; text-align: center;
    }
    .card .value { font-size: 2rem; font-weight: 600; color: #58a6ff; }
    .card .label { font-size: 0.8rem; color: #8b949e; margin-top: 0.25rem; }
    .section {
      background: #161b22; border: 1px solid #30363d; border-radius: 8px;
      padding: 1.25rem; margin-bottom: 1.5rem;
    }
    .section h2 { font-size: 0.95rem; font-weight: 600; color: #c9d1d9; margin-bottom: 1rem; }
    .cap-wrap { background: #21262d; border-radius: 4px; height: 8px; overflow: hidden; }
    .cap-bar  { height: 100%; transition: width 0.5s, background 0.3s; background: #238636; }
    .cap-label { font-size: 0.75rem; color: #8b949e; margin-top: 0.4rem; }
    .search-row { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .search-row input {
      flex: 1; padding: 0.5rem 0.75rem;
      background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
      color: #e1e4e8; font-size: 0.9rem; outline: none;
    }
    .search-row input:focus { border-color: #58a6ff; }
    .search-row button {
      padding: 0.5rem 1.1rem; background: #238636; border: none;
      border-radius: 6px; color: #fff; font-size: 0.9rem; cursor: pointer;
    }
    .search-row button:hover { background: #2ea043; }
    table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
    th { text-align: left; padding: 0.5rem 0.4rem; color: #8b949e; border-bottom: 1px solid #30363d; }
    td { padding: 0.45rem 0.4rem; border-bottom: 1px solid #21262d; vertical-align: top; }
    td:first-child { color: #c9d1d9; max-width: 280px; }
    .tag {
      display: inline-block; padding: 0.1rem 0.4rem;
      background: #1f3a5f; border-radius: 3px;
      font-size: 0.72rem; color: #79c0ff; margin: 0.1rem 0.1rem 0 0;
    }
    .status-line { font-size: 0.8rem; margin-top: 0.25rem; }
    .ok    { color: #3fb950; }
    .warn  { color: #d29922; }
    .error { color: #f85149; }
    .muted { color: #8b949e; font-size: 0.83rem; padding: 0.5rem 0; }
  </style>
</head>
<body>
  <header>
    <h1>Claude Memory <span>Hub</span></h1>
    <p class="subtitle status-line ok" id="status">Connecting…</p>
  </header>

  <div class="grid">
    <div class="card"><div class="value" id="s-active">—</div><div class="label">Active Entries</div></div>
    <div class="card"><div class="value" id="s-archived">—</div><div class="label">Archived</div></div>
    <div class="card"><div class="value" id="s-machines">—</div><div class="label">Machines</div></div>
    <div class="card"><div class="value" id="s-cap">—</div><div class="label">Capacity Used</div></div>
  </div>

  <div class="section">
    <div class="cap-wrap"><div class="cap-bar" id="cap-bar" style="width:0%"></div></div>
    <div class="cap-label" id="cap-label">Loading…</div>
  </div>

  <div class="section">
    <h2>Search</h2>
    <div class="search-row">
      <input id="q" type="text" placeholder="Keyword, tag, or category…" />
      <button onclick="doSearch()">Search</button>
    </div>
    <div id="search-out"></div>
  </div>

  <div class="section">
    <h2>Recent Entries</h2>
    <div id="entries-out"><p class="muted">Loading…</p></div>
  </div>

  <script>
    const BASE = '/api';
    // API key injected server-side or set manually for local dev
    const KEY  = window._HUB_KEY || '';

    async function apiFetch(path, opts = {}) {
      const r = await fetch(BASE + path, {
        headers: { 'X-API-Key': KEY, 'Content-Type': 'application/json', ...opts.headers },
        ...opts,
      });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    }

    async function loadStats() {
      try {
        const s = await apiFetch('/stats');
        document.getElementById('s-active').textContent   = s.active   ?? '—';
        document.getElementById('s-archived').textContent = s.archived ?? '—';
        document.getElementById('s-machines').textContent = s.machines ?? '—';
        document.getElementById('s-cap').textContent      = (s.capacity_pct ?? 0) + '%';

        const bar = document.getElementById('cap-bar');
        bar.style.width      = (s.capacity_pct ?? 0) + '%';
        bar.style.background = s.capacity_pct > 80 ? '#f85149' : s.capacity_pct > 60 ? '#d29922' : '#238636';

        document.getElementById('cap-label').textContent =
          `${s.active ?? 0} / 500 entries  ·  last sync: ${s.last_sync ? new Date(s.last_sync).toLocaleString() : 'never'}`;

        const el = document.getElementById('status');
        el.textContent = '● Connected';
        el.className   = 'subtitle status-line ok';
      } catch (e) {
        const el = document.getElementById('status');
        el.textContent = '● Offline — ' + e.message;
        el.className   = 'subtitle status-line error';
      }
    }

    async function loadEntries() {
      try {
        const d = await apiFetch('/entries?limit=25');
        renderTable(d.entries, document.getElementById('entries-out'));
      } catch (e) {
        document.getElementById('entries-out').innerHTML =
          `<p class="muted error">${e.message}</p>`;
      }
    }

    function renderTable(rows, container) {
      if (!rows || !rows.length) {
        container.innerHTML = '<p class="muted">No entries.</p>';
        return;
      }
      const trs = rows.map(e => `
        <tr>
          <td>${e.title}</td>
          <td>${e.category}${e.subcategory ? '/' + e.subcategory : ''}</td>
          <td>${(e.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}</td>
          <td style="text-align:right">${e.recurrence_count}</td>
          <td style="text-align:right">${((e.confidence_score || 0) * 100).toFixed(0)}%</td>
          <td>${e.last_seen || ''}</td>
        </tr>`).join('');
      container.innerHTML = `
        <table>
          <thead><tr>
            <th>Title</th><th>Category</th><th>Tags</th>
            <th style="text-align:right">Rec.</th>
            <th style="text-align:right">Conf.</th>
            <th>Last Seen</th>
          </tr></thead>
          <tbody>${trs}</tbody>
        </table>`;
    }

    async function doSearch() {
      const q   = document.getElementById('q').value.trim();
      const out = document.getElementById('search-out');
      if (!q) { out.innerHTML = ''; return; }
      out.innerHTML = '<p class="muted">Searching…</p>';
      try {
        const d = await apiFetch('/search', {
          method: 'POST',
          body: JSON.stringify({ query: q, limit: 20 }),
        });
        renderTable(d.results, out);
      } catch (e) {
        out.innerHTML = `<p class="muted error">${e.message}</p>`;
      }
    }

    document.getElementById('q').addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch();
    });

    loadStats();
    loadEntries();
    setInterval(loadStats, 60_000);
  </script>
</body>
</html>

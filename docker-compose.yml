services:
  gateway:
    image: nginx:1.25-alpine
    container_name: memory-gateway
    restart: unless-stopped
    ports:
      - "0.0.0.0:8443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs/ca.crt:/etc/nginx/certs/ca.crt:ro
      - ./certs/server.crt:/etc/nginx/certs/server.crt:ro
      - ./certs/server.key:/etc/nginx/certs/server.key:ro
      - ./dashboard:/usr/share/nginx/html:ro
    networks:
      - hub-internal
      - 3dmations-shared
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: memory-api
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://claude:${DB_PASSWORD}@db:5432/claude_memory
      - API_KEY=${API_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    networks:
      - hub-internal
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8484/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  db:
    image: postgres:16-alpine
    container_name: memory-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=claude_memory
      - POSTGRES_USER=claude
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - hub-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claude -d claude_memory"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  hub-internal:
    driver: bridge
  3dmations-shared:
    external: true

volumes:
  pgdata:

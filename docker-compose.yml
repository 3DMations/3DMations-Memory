services:
  ts-hub:
    image: tailscale/tailscale:latest
    container_name: hub-ts
    hostname: hub
    restart: unless-stopped
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY}
      TS_EXTRA_ARGS: --advertise-tags=tag:hub
      TS_SERVE_CONFIG: /config/serve.json
      TS_STATE_DIR: /var/lib/tailscale
    volumes:
      - hub-ts-state:/var/lib/tailscale
      - ./tailscale/serve.json:/config/serve.json:ro
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module
    networks:
      - hub-internal
      - jarvis-internal

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hub-app
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    # Tailnet is the only ingress. App's HTTP socket is reachable inside ts-hub's
    # netns at 127.0.0.1:3000 — that's what serve.json proxies to.
    # NO `ports:` and NO `networks:` — both inherited from ts-hub.
    network_mode: service:ts-hub
    volumes:
      - ./app:/app
      - hub-node-modules:/app/node_modules
      - hub-next-cache:/app/.next
      # Mount the hub-scrubber skill at the relative path the test expects
      # (test does `../../.claude/skills/hub-scrubber/...` from /app/__tests__/).
      - ./.claude/skills:/.claude/skills:ro
    depends_on:
      db:
        condition: service_healthy
      ts-hub:
        condition: service_started

  # Debug profile (Phase 3a O4=a): emergency local-only access when tailnet is
  # unreachable. Mutually exclusive with `app` (shared volumes — DO NOT run both).
  # Bring up: `docker compose stop app && docker compose --profile debug up -d app-debug`
  # Tear down: `docker compose --profile debug down app-debug && docker compose up -d app`
  app-debug:
    profiles: [debug]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hub-app-debug
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    ports:
      - "127.0.0.1:${APP_PORT}:3000"
    volumes:
      - ./app:/app
      - hub-node-modules:/app/node_modules
      - hub-next-cache:/app/.next
    depends_on:
      db:
        condition: service_healthy
    networks:
      - hub-internal

  db:
    image: postgres:18-alpine
    container_name: hub-db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      # PG18+ uses major-version subdirs under /var/lib/postgresql.
      # Mounting /data is rejected as "unused" — mount the parent instead.
      - hub-db-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - hub-internal

volumes:
  hub-db-data:
  hub-node-modules:
  hub-next-cache:
  hub-ts-state:

networks:
  hub-internal:
    driver: bridge
  jarvis-internal:
    external: true

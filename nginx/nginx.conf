worker_processes auto;
events { worker_connections 1024; }

http {
    # Rate limiting by client certificate DN (AUDIT-013: enforce unique CNs via gen-certs.sh)
    limit_req_zone $ssl_client_s_dn zone=per_client:10m rate=10r/s;

    # Internal healthcheck endpoint — no mTLS, no rate limit
    server {
        listen 80;
        location /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
        location / { return 444; }
    }

    server {
        listen 443 ssl;
        server_name memory-hub;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.3;
        ssl_ciphers         TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256;
        ssl_prefer_server_ciphers on;

        # mTLS — require valid client cert signed by our CA
        ssl_client_certificate /etc/nginx/certs/ca.crt;
        ssl_verify_client on;
        ssl_verify_depth 2;

        # Rate limiting — burst allows short bursts, nodelay prevents queuing
        limit_req zone=per_client burst=20 nodelay;
        limit_req_status 429;

        location /api/ {
            proxy_pass         http://api:8484;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Client-CN $ssl_client_s_dn;
            proxy_read_timeout 30s;
            proxy_send_timeout 10s;
            proxy_connect_timeout 5s;
        }

        # Dashboard — serve static files
        location / {
            root  /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
